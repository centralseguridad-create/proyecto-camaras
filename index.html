<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitoreo de Cámaras – V2.6</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc,
  setDoc,
  query,
  where,
  orderBy,
  limit,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8H6MX4_6CF2hzoU2D1Mj5TrrGCtSp79I",
  authDomain: "monitoreo-camaras-462c7.firebaseapp.com",
  projectId: "monitoreo-camaras-462c7",
  storageBucket: "monitoreo-camaras-462c7.firebasestorage.app",
  messagingSenderId: "543042810967",
  appId: "1:543042810967:web:44f68bf538922d60a41f12"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.db = db;

window.firebaseTools = {
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc,
  setDoc,
  query,
  where,
  orderBy,
  limit,
  serverTimestamp
};

</script>

  
<style>
body{background:#f8fafc}
.card{border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
table{font-size:14px}

.operativa{background:#e6fffa!important}
.intermitente{background:#fff7ed!important}
.movilidad{background:#e0e7ff!important}
.sin-senal{background:#fee2e2!important}

textarea{font-family:Consolas,monospace;font-size:13px}
</style>
</head>

<body class="container my-4">

<h2 class="mb-4">📹 Monitoreo de Cámaras – V2.6</h2>

<div class="card p-4 mb-4">

<input type="text" id="buscador" class="form-control mb-2"
placeholder="🔍 Buscar cámara, sector o empresa">

<label>Eventos Totales (manual)</label>
<input type="number" id="eventosTotales" class="form-control mb-3" value="0">
<div class="row mb-3">
  <div class="col-md-4">
    <label>Turno</label>
    <select id="turnoSelect" class="form-select">
      <option value="Diurno">Diurno</option>
      <option value="Nocturno">Nocturno</option>
    </select>
  </div>

  <div class="col-md-4">
    <label>Fecha del Reporte</label>
    <input type="date" id="fechaReporte" class="form-control">
  </div>
</div>


<div class="d-flex flex-wrap gap-2">
<button class="btn btn-dark" id="btnGuardarTurno">
💾 Guardar Turno
</button>  
<button class="btn btn-outline-primary" id="btnReporte">📝 Reporte WhatsApp</button>
<button class="btn btn-outline-success" id="btnCopiar">📋 Copiar WhatsApp</button>
<button class="btn btn-success" id="btnExcel">📊 Exportar Excel</button>
<button class="btn btn-danger" id="btnPDF">📄 Exportar PDF</button>
</div>
</div>

<div class="card p-3 mb-3 d-flex justify-content-center align-items-center">
<div style="width:260px">
<canvas id="canvasGrafico" height="220"></canvas>
</div>
</div>

<div class="card p-3 mb-4">
<strong>📋 Cámaras del estado seleccionado</strong>
<ul id="detalleGrafico" class="mt-2 mb-0"></ul>
</div>

<table class="table table-bordered table-hover" id="tabla">
<thead class="table-dark">
<tr>
<th>N°</th>
<th>Cámara</th>
<th>Sector</th>
<th>Operatividad</th>
<th>Empresa</th>
<th>Motivo</th>
<th>Observación</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="card p-3 mt-4">
<textarea id="reporteTexto" rows="40" class="form-control" readonly></textarea>
</div>

<script>
let chart=null;
  
let turnoGuardado = false;  

window.onload = async () => {

 await cargarDesdeFirebase();

 await cargarUltimoTurno();

};

turnoSelect.onchange = ()=>{

 desbloquearEdicion();

 turnoGuardado = false;


};

fechaReporte.onchange = ()=>{

 desbloquearEdicion();

 turnoGuardado = false;


};  


async function cargarDesdeFirebase(){

 try{

  const snapshot = await firebaseTools.getDocs(
   firebaseTools.collection(db,"camaras")
  );

  const data = [];

  snapshot.forEach(doc=>{

     data.push({
      firebaseId: doc.id,
      ...doc.data()
     });

  });

  console.log("Cámaras cargadas:",data.length);

  construirTabla(data);
   
  actualizar();
   
 }catch(error){

  console.error(error);

  alert("❌ Error cargando Firebase");

 }

}

async function cargarUltimoTurno(){

 try{

  const q = firebaseTools.query(
   firebaseTools.collection(window.db,"reportes"),
   firebaseTools.orderBy("timestamp","desc"),
   firebaseTools.limit(1)
  );

  const snapshot = await firebaseTools.getDocs(q);

  if(snapshot.empty){
   return;
  }

  const ultimo = snapshot.docs[0].data();

  fechaReporte.value = ultimo.fecha || "";

  turnoSelect.value = ultimo.turno || "Diurno";

  eventosTotales.value = ultimo.eventos || 0;

  reporteTexto.value = ultimo.reporte || "";

    // 🔥 RESTAURAR ESTADOS

  if(ultimo.camaras){

   [...tabla.tBodies[0].rows].forEach(tr=>{

    const numero = tr.cells[0].innerText;

    const cam = ultimo.camaras.find(c=>c.numero == numero);

    if(!cam) return;

    tr.querySelector(".estado").value =
      cam.estado || "Operativa";

    tr.querySelector(".motivo").value =
      cam.motivo || "";

    tr.cells[6].innerText =
      cam.observacion || "";

   });

   actualizar();

  } 

  turnoGuardado = true;

  console.log("✅ Último turno restaurado");

 }catch(error){

  console.error(error);

 }

}
  
/* ================= TABLA ================= */
function construirTabla(data){
 const tb=tabla.querySelector("tbody");
 tb.innerHTML="";

 data.forEach(r=>{
  const id =
   r.numero ||
   r["N°"] ||
   r["Nº"] ||
   r["No"];
  if(!id)return;

  const tr=document.createElement("tr");
  tr.dataset.id = r.firebaseId || ""; 
  tr.innerHTML=`
   <td>${id}</td>
   <td>${r.camara || r["Cámara"] || ""}</td>
   <td>${r.sector || r["Sector"] || ""}</td>
   <td>
    <select class="form-select form-select-sm estado">
     <option>Operativa</option>
     <option>Intermitente</option>
     <option>Problema de movilidad</option>
     <option>Sin Señal</option>
    </select>
   </td>
   <td>${r.empresa || r["Empresa"] || ""}</td>
   <td>
    <select class="form-select form-select-sm motivo">
     <option value="">Seleccione</option>
     <option>Mantención</option>
     <option>Falla eléctrica</option>
     <option>Vandalismo</option>
     <option>Otro</option>
    </select>
   </td>
   <td contenteditable="true"></td>`;
  tb.appendChild(tr);

  const estadoSel=tr.querySelector(".estado");
  const motivoSel=tr.querySelector(".motivo");
   estadoSel.value = r.estado || "Operativa";
   motivoSel.value = r.motivo || "";
   tr.cells[6].innerText = r.observacion || "";

  estadoSel.onchange=async()=>{
   if(estadoSel.value!=="Operativa" && !motivoSel.value){
    alert("Debe seleccionar un motivo.");
    estadoSel.value="Operativa";
    return;
   }
   actualizar();
    
   await actualizarCamara(tr);

   turnoGuardado = false;
   desbloquearEdicion(); 
    
  };

  motivoSel.onchange=async()=>{

   actualizar();

   await actualizarCamara(tr);

   turnoGuardado = false;
   desbloquearEdicion(); 

  };
  tr.cells[6].oninput=async()=>{

   await actualizarCamara(tr);

   turnoGuardado = false;
   desbloquearEdicion(); 

  };

  actualizar();
 });

}

async function actualizarCamara(tr){

 try{

  const id = tr.dataset.id;

  if(!id) return;

  await firebaseTools.updateDoc(

   firebaseTools.doc(window.db,"camaras",id),

   {

    estado: tr.querySelector(".estado").value,
    motivo: tr.querySelector(".motivo").value,
    observacion: tr.cells[6].innerText

   }

  );

  console.log("✅ Cámara actualizada");

 }catch(error){

  console.error(error);

 }

}

function bloquearEdicion(){

 [...tabla.tBodies[0].rows].forEach(tr=>{

  tr.querySelector(".estado").disabled = true;

  tr.querySelector(".motivo").disabled = true;

  tr.cells[6].contentEditable = false;

 });

}  

function desbloquearEdicion(){

 [...tabla.tBodies[0].rows].forEach(tr=>{

  tr.querySelector(".estado").disabled = false;

  tr.querySelector(".motivo").disabled = false;

  tr.cells[6].contentEditable = true;

 });

}  
/* ================= ACTUALIZAR ================= */
function actualizar(){
 let op=0,int=0,mov=0,sin=0;

 [...tabla.tBodies[0].rows].forEach(tr=>{
  tr.className="";
  const e=tr.querySelector(".estado").value;

  if(e==="Sin Señal"){sin++;tr.classList.add("sin-senal")}
  else if(e==="Intermitente"){int++;tr.classList.add("intermitente")}
  else if(e==="Problema de movilidad"){mov++;tr.classList.add("movilidad")}
  else{op++;tr.classList.add("operativa")}
 });

 renderGrafico(op,int,mov,sin);
}

/* ================= GRAFICO ================= */
function renderGrafico(op,int,mov,sin){
 if(chart)chart.destroy();
 chart=new Chart(canvasGrafico,{
  type:"pie",
  data:{
   labels:["Operativas","Intermitentes","Movilidad","Sin Señal"],
   datasets:[{
    data:[op,int,mov,sin],
    backgroundColor:["#22c55e","#facc15","#6366f1","#ef4444"]
   }]
  },
  options:{
   plugins:{legend:{position:"bottom"}},
   onClick:(e,el)=>{
    if(!el.length)return;
    const map={
     "Operativas":"Operativa",
     "Intermitentes":"Intermitente",
     "Movilidad":"Problema de movilidad",
     "Sin Señal":"Sin Señal"
    };
    listarCamarasPorEstado(map[chart.data.labels[el[0].index]]);
   }
  },
  plugins:[ChartDataLabels]
 });
}

/* ================= DESGLOSE ================= */
function listarCamarasPorEstado(estado){
 detalleGrafico.innerHTML="";
 [...tabla.tBodies[0].rows].forEach(tr=>{
  if(tr.querySelector(".estado").value===estado){
   const li=document.createElement("li");
   li.textContent=`${tr.cells[0].innerText} – ${tr.cells[1].innerText} (${tr.cells[2].innerText})`;
   detalleGrafico.appendChild(li);
  }
 });
 if(!detalleGrafico.children.length)
  detalleGrafico.innerHTML="<li>No hay cámaras</li>";
}

/* ================= BUSCADOR ================= */
buscador.oninput=e=>{
 const q=e.target.value.toLowerCase();
 [...tabla.tBodies[0].rows].forEach(tr=>{
  tr.style.display=tr.innerText.toLowerCase().includes(q)?"":"none";
 });
};

async function guardarTurno(){

 try{

  const fecha = document.getElementById("fechaReporte").value;
  const turno = document.getElementById("turnoSelect").value;
  const eventos = eventosTotales.value || 0;

    // 🔥 VALIDAR DUPLICADO


  if(!fecha){
   alert("Debe seleccionar fecha ❗");
   return;
  }
   
  const reporteId = `${fecha}_${turno}`;
    const existente = await firebaseTools.getDocs(
   firebaseTools.query(
    firebaseTools.collection(window.db,"reportes"),
    firebaseTools.where("fecha","==",fecha),
    firebaseTools.where("turno","==",turno)
   )
  );

  if(!existente.empty){

   alert("❌ Ese turno ya existe");

   return;

  }
  const camaras = [...tabla.tBodies[0].rows].map(tr=>({

   numero: tr.cells[0].innerText,
   camara: tr.cells[1].innerText,
   sector: tr.cells[2].innerText,
   estado: tr.querySelector(".estado").value,
   empresa: tr.cells[4].innerText,
   motivo: tr.querySelector(".motivo").value,
   observacion: tr.cells[6].innerText

  }));

  await firebaseTools.setDoc(

   firebaseTools.doc(window.db,"reportes",reporteId),

   {
    fecha,
    turno,
    eventos,
    timestamp: firebaseTools.serverTimestamp(),
    camaras,
    reporte: generarTextoReporte()
   }

  );

  turnoGuardado = true;
  bloquearEdicion(); 

  reporteTexto.value = generarTextoReporte(); 

  alert("✅ Turno guardado correctamente");

 }catch(error){

  console.error(error);

  alert("❌ Error guardando turno");

 }

}
function generarTextoReporte(){

  const empresas = {};
  const eventos = eventosTotales.value || 0;
  const turno = document.getElementById("turnoSelect").value;
  const fechaInput = document.getElementById("fechaReporte").value;

  if(!fechaInput){
    return "";
  }

  const partes = fechaInput.split("-");
  const fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;

  let saludo = "";

  if(turno === "Diurno"){
    saludo = `Buenas tardes, término del turno diurno del *${fechaFormateada}* con los reportes mencionados del día de hoy\n\n`;
  } else {
    saludo = `Buenos días, término del turno nocturno del *${fechaFormateada}* con los reportes mencionados del día de hoy\n\n`;
  }

  [...tabla.tBodies[0].rows].forEach(tr => {

    const emp = tr.cells[4].innerText.trim() || "SIN EMPRESA";
    const estado = tr.querySelector(".estado").value;
    const obs = tr.cells[6].innerText.trim();

    if(!empresas[emp]){
      empresas[emp] = {
        total:0,
        sin:[],
        inter:[],
        mov:[],
        obs:[]
      };
    }

    empresas[emp].total++;

    let linea = `• ${tr.cells[0].innerText} (${tr.cells[1].innerText} / ${tr.cells[2].innerText})`;

    if(obs){
      linea += ` — OBS: ${obs}`;
    }

    if(estado === "Sin Señal"){
      empresas[emp].sin.push(linea);
    }
    else if(estado === "Intermitente"){
      empresas[emp].inter.push(linea);
    }
    else if(estado === "Problema de movilidad"){
      empresas[emp].mov.push(linea);
    }
    else if(obs){
      empresas[emp].obs.push(linea);
    }

  });

  let t = saludo;

  t += "REPORTE DE CÁMARAS\n\n";

  Object.entries(empresas).forEach(([emp,d])=>{

    t += `EMPRESA: ${emp}\n`;
    t += `TOTAL CÁMARAS: ${d.total}\n`;
    t += `🟢 CÁMARAS OPERATIVAS TOTALES: ${d.total - d.sin.length}\n\n`;

    if(d.sin.length){
      t += `🔴 ${d.sin.length} SIN SEÑAL:\n${d.sin.join("\n")}\n\n`;
    }

    if(d.inter.length){
      t += `🟡 ${d.inter.length} INTERMITENTES:\n${d.inter.join("\n")}\n\n`;
    }

    if(d.mov.length){
      t += `🔵 ${d.mov.length} MOVILIDAD:\n${d.mov.join("\n")}\n\n`;
    }

    if(d.obs.length){
      t += `📝 ${d.obs.length} CON OBSERVACIÓN:\n${d.obs.join("\n")}\n\n`;
    }

    t += "-------------------------\n\n";

  });

  t += `📌 EVENTOS TOTALES REPORTADOS: ${eventos}`;

  return t;

}  
/* ================= REPORTE WHATSAPP ================= */
btnReporte.onclick = () => {

  if(!turnoGuardado){

   alert("❌ Debe guardar el turno antes de generar el reporte");

   return;

   }
  
   reporteTexto.value = generarTextoReporte();
};


/* ================= COPIAR ================= */
btnCopiar.onclick=()=>{
 if(!reporteTexto.value)return alert("Genere el reporte primero");
 navigator.clipboard.writeText(reporteTexto.value)
 .then(()=>alert("Reporte copiado ✔️"));
};

/* ================= EXPORTAR EXCEL ================= */
btnExcel.onclick=()=>{
 const rows=[...tabla.tBodies[0].rows].map(tr=>({
  "N°":tr.cells[0].innerText,
  "Cámara":tr.cells[1].innerText,
  "Sector":tr.cells[2].innerText,
  "Estado":tr.querySelector(".estado").value,
  "Empresa":tr.cells[4].innerText,
  "Motivo":tr.querySelector(".motivo").value,
  "Observación":tr.cells[6].innerText
 }));
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Cámaras");
 XLSX.writeFile(wb,"reporte_camaras.xlsx");
};

/* ================= EXPORTAR PDF ================= */
btnPDF.onclick=()=>{
 const {jsPDF}=window.jspdf;
 const pdf=new jsPDF("l","mm","a4");

 pdf.text("Reporte de Cámaras",14,15);

 pdf.autoTable({
  startY:22,
  head:[["N°","Cámara","Sector","Estado","Empresa","Motivo","Observación"]],
  body:[...tabla.tBodies[0].rows].map(tr=>[
   tr.cells[0].innerText,
   tr.cells[1].innerText,
   tr.cells[2].innerText,
   tr.querySelector(".estado").value,
   tr.cells[4].innerText,
   tr.querySelector(".motivo").value,
   tr.cells[6].innerText
  ]),
  styles:{fontSize:9,cellPadding:3,overflow:"linebreak"},
  headStyles:{fillColor:[30,41,59],textColor:255},
  didParseCell:data=>{
   if(data.section==="body" && data.column.index===3){
    const v=data.cell.raw;
    if(v==="Operativa")data.cell.styles.fillColor=[34,197,94];
    if(v==="Intermitente")data.cell.styles.fillColor=[250,204,21];
    if(v==="Problema de movilidad")data.cell.styles.fillColor=[99,102,241];
    if(v==="Sin Señal")data.cell.styles.fillColor=[239,68,68];
   }
  }
 });

 pdf.save("reporte_camaras.pdf");
};

</script>

</body>
</html>
